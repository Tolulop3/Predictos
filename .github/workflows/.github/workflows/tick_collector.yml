name: PredictOS Tick Collector

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-ticks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect ticks
        env:
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          PYTHONPATH:         ${{ github.workspace }}
        run: |
          python - << 'EOF'
          import logging
          logging.basicConfig(level=logging.INFO)
          from src.fetcher import fetch_polymarket_markets, fetch_kalshi_markets
          from src.tick_store import save_ticks_batch, prune_old_ticks, tick_store_stats
          markets = []
          try:
              markets += fetch_polymarket_markets(max_markets=300, enrich_top_n=50)
          except Exception as e:
              print(f"Polymarket failed: {e}")
          try:
              markets += fetch_kalshi_markets(limit=100)
          except Exception as e:
              print(f"Kalshi failed: {e}")
          save_ticks_batch(markets)
          print(tick_store_stats())
          EOF

      - name: Commit tick data
        run: |
          git config --global user.name  "PredictOS Tick Bot"
          git config --global user.email "predictos-bot@users.noreply.github.com"
          git add data/ticks/ || true
          git diff --staged --quiet || git commit -m "Tick snapshot — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"
