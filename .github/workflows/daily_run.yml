name: PredictOS Daily Run

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-predictos:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PredictOS pipeline
        env:
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          BANKROLL:           ${{ secrets.BANKROLL }}
          PYTHONPATH:         ${{ github.workspace }}
          LOG_LEVEL:          ${{ github.event.inputs.debug == 'true' && 'DEBUG' || 'INFO' }}
        run: |
          python -m src.main

      - name: Commit dashboard and data
        run: |
          git config --global user.name  "PredictOS Bot"
          git config --global user.email "predictos-bot@users.noreply.github.com"
          git add docs/index.html
          git add data/ || true
          git add models/ || true
          git diff --staged --quiet || git commit -m "PredictOS daily run — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
